name: 'Setup Project'
description: 'Setup project with pnpm, Node.js, and dependencies'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.tool-versions'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install
